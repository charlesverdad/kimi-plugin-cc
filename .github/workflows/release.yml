name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Run tests
        run: npm test

      - name: Build plugin archive
        run: |
          zip -r "kimi-plugin-${GITHUB_REF_NAME}.zip" \
            plugins .claude-plugin README.md LICENSE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: kimi-plugin-*.zip
