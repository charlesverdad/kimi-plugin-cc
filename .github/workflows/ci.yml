name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x', '22.x']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax-check plugin scripts
        run: find plugins -name '*.mjs' -print0 | xargs -0 -n1 node --check

      - name: Run tests
        run: npm test
